name: Build AdrenaProxy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-mingw:
    runs-on: ubuntu-latest
    # MinGW build is compile-check only — the DLL does not work in Wine/Proton
    # due to MinGW C++ runtime incompatibilities. Use the MSVC build for deployment.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 cmake ninja-build

    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -G Ninja \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
          -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DADRENA_ENABLE_LOGGING=ON

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Package
      run: |
        mkdir -p dist
        cp build/dxgi.dll dist/
        cp build/dlss.dll dist/
        cp adrena_proxy.ini dist/
        cp README.md dist/
        cp LICENSE dist/

    - uses: actions/upload-artifact@v4
      with:
        name: AdrenaProxy-mingw
        path: dist/

  build-msvc:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DADRENA_ENABLE_LOGGING=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Package
      run: |
        mkdir dist
        copy build\Release\dxgi.dll dist\
        copy build\Release\dlss.dll dist\
        copy adrena_proxy.ini dist\
        copy README.md dist\
        copy LICENSE dist\

    - uses: actions/upload-artifact@v4
      with:
        name: AdrenaProxy-msvc
        path: dist/

  release:
    needs: [build-msvc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true

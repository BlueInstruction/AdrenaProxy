; ═══════════════════════════════════════════════════════════════════════════
; AdrenaProxy — Steam Deck (OLED / LCD) + Proton profile
;
; Target stack:  SteamOS 3  →  Proton (+ DXVK / VKD3D-Proton)  →  RADV
; Target GPU :  AMD Van Gogh / Sephiroth (RDNA2 APU, 1.6 TFLOPS)
;
; 800p LCD / 1200p OLED at 40-90 Hz.  SGSR2 runs great on RDNA2 and
; gets you to the handheld's native refresh in most AAA DX12 titles.
; ═══════════════════════════════════════════════════════════════════════════

[upscaler]
mode = sgsr2

[SGSR]
enabled      = 1
mode         = sgsr2
quality      = quality
custom_scale = 0.0
sharpness    = 0.75

[FrameGeneration]
; Steam Deck's GameScope compositor already handles frame pacing; we only
; engage multi-FG below 40 fps to avoid double-paced judder.
mode           = x2
fps_threshold  = 38

[Overlay]
enabled     = 1
toggle_key  = HOME
fps_display = 1
opacity     = 0.80

[Advanced]
force_d3d11      = 0
rt_format        = 0
max_frame_queue  = 3
vsync            = 0

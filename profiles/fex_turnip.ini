; ═══════════════════════════════════════════════════════════════════════════
; AdrenaProxy — FEX-Emu / Box64 + Turnip profile
;
; Target stack:  Linux/ARM64  →  FEX or Box64 (x86 JIT)  →  Wine  →
;                DXVK / VKD3D-Proton  →  Turnip (Mesa)
; Target GPU :  Adreno on ARM64 Linux (PinePhone / Nintendo Switch / SBC)
;
; The JIT tax + Turnip's async-compute path reward aggressive scaling.
; Ultra-Performance with SGSR1 is the sweet spot when the host CPU is
; the real bottleneck (most Cortex-A78 class parts).
; ═══════════════════════════════════════════════════════════════════════════

[upscaler]
mode = sgsr1

[SGSR]
enabled      = 1
mode         = sgsr1
quality      = ultra_performance
custom_scale = 0.0
sharpness    = 0.90

[FrameGeneration]
mode           = x3
fps_threshold  = 20

[Overlay]
enabled     = 1
toggle_key  = HOME
fps_display = 1
opacity     = 0.75

[Advanced]
force_d3d11      = 0
rt_format        = 0
; FEX/Box64's CPU JIT invalidates caches on every dispatch queue flush;
; keeping max_frame_queue = 1 actually improves frame-time consistency.
max_frame_queue  = 1
vsync            = 0

; ═══════════════════════════════════════════════════════════════════════════
; AdrenaProxy — Windows on ARM (Snapdragon X Elite / X2 Elite) profile
;
; Target stack:  Windows/ARM64  →  ARM64EC / Prism x86 emu  →  VKD3D-Proton
;                   (when used under Wine) or native DX12 path
; Target GPU :  Qualcomm Adreno X1 / X1-85 (Snapdragon X-series SoC)
;
; Tuned for 1080p / 1440p gaming on thin-and-light ARM laptops where the
; iGPU sustains ~4-6 TFLOPS but is memory-bandwidth limited.  SGSR2 is
; preferred here because the CPU + GPU both have headroom to spend on
; the temporal pass.
; ═══════════════════════════════════════════════════════════════════════════

[upscaler]
mode = sgsr2

[SGSR]
enabled      = 1
mode         = sgsr2
quality      = balanced
custom_scale = 0.0
sharpness    = 0.80

[FrameGeneration]
mode           = x2
fps_threshold  = 40

[Overlay]
enabled     = 1
toggle_key  = HOME
fps_display = 1
opacity     = 0.85

[Advanced]
force_d3d11      = 0
rt_format        = 0
max_frame_queue  = 2
vsync            = 0

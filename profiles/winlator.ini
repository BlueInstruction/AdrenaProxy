; ═══════════════════════════════════════════════════════════════════════════
; AdrenaProxy — Winlator (Adreno + Turnip) profile
;
; Target stack:  Wine/Proton  →  DXVK / VKD3D-Proton  →  Turnip (Mesa)
; Target GPU :  Qualcomm Adreno 6xx / 7xx (Snapdragon 8-series SoC)
;
; Tuned for sustained 30→60 fps uplift in DX12 titles on mid-tier phones
; and tablets.  Quality is biased toward Performance because Adreno
; bandwidth is the bottleneck, not shader throughput.
; ═══════════════════════════════════════════════════════════════════════════

[upscaler]
mode = sgsr1

[SGSR]
enabled      = 1
mode         = sgsr1
quality      = performance
custom_scale = 0.0
sharpness    = 0.85

[FrameGeneration]
; Extra-Present mode — works everywhere, uses the DXGI proxy's present pump.
; Bumping to x2 by default is safe on Winlator where the display refresh is
; usually capped at 60 Hz and the game target is 30 fps.
mode           = x2
fps_threshold  = 28

[Overlay]
enabled     = 1
toggle_key  = HOME
fps_display = 1
opacity     = 0.80

[Advanced]
force_d3d11      = 0
rt_format        = 0
; Keep the queue shallow — Winlator has a high-latency present path,
; deep queues just add input lag without adding throughput.
max_frame_queue  = 2
vsync            = 0

; ═══════════════════════════════════════════════════════════════════════════
; AdrenaProxy v2.0 — Configuration
; Place alongside the game executable
; ═══════════════════════════════════════════════════════════════════════════

[upscaler]
; Built-in options: sgsr1, sgsr2
; Plugin options:   fsr2, xess  (require SDK DLL in plugins/)
mode = sgsr1

[SGSR]
enabled=0
mode=sgsr1
quality=quality
custom_scale=0.0
sharpness=0.80

[fsr2]
; Quality ratio: 1.0 = native, 1.5 = balanced, 1.7 = performance, 2.0 = ultra-performance
; Leave at 0 to auto-select based on render vs display resolution.
quality_ratio = 0

[xess]
; XeSS quality preset: 0=auto, 1=quality, 2=balanced, 3=performance, 4=ultra-performance
quality_preset = 0

[FrameGeneration]
mode=x1
fps_threshold=0

[Overlay]
enabled=1
toggle_key=HOME
fps_display=1
opacity=0.85

[Advanced]
force_d3d11=0
rt_format=0
max_frame_queue=2
vsync=0
